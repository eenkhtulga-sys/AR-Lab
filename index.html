<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Ачаалж байх үед харагдах бичиг */
      #example-scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.5); color: white; z-index: 2;
      }
    </style>
  </head>
  
  <body>
    <div id="example-scanning-overlay">Зураг руу утсаа чиглүүлнэ үү...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #example-scanning-overlay;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="labModel" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#labModel" 
                      position="0 0 0" 
                      rotation="0 0 0" 
                      scale="0.1 0.1 0.1"
                      animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
        </a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
